name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras --group dev
      - run: uv run ruff check .
      - run: uv run mypy strawberry_django_aggregates/
      - run: uv run pytest
